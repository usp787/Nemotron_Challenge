# One-prompt LoRA load probe for a newer vLLM eval image.
#
# This is intentionally tiny: it verifies that vLLM can initialize the
# Nemotron-H LoRA manager and run one adapted generation before we spend a
# full H200 allocation on the verification pipeline.

model:
  name: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
  dtype: bfloat16
  max_model_len: 8192
  max_tokens: 64
  temperature: 0.0
  top_p: 1.0
  trust_remote_code: true

runtime:
  backend: vllm
  gpu_memory_utilization: 0.85
  tensor_parallel_size: 1
  max_num_seqs: 1
  lora:
    enabled: true
    path: outputs/lora_adapter
    max_lora_rank: 32
    max_loras: 1

data:
  input_path: data/lora_probe_prompt.jsonl
  output_dir: outputs

logging:
  save_prompt: true
  save_latency: true
  save_errors: true
