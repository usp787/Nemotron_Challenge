model:
  name: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
  dtype: bfloat16
  max_model_len: 65536
  max_tokens: 60000
  temperature: 1.0
  top_p: 1.0
  trust_remote_code: true

runtime:
  backend: vllm
  gpu_memory_utilization: 0.90
  tensor_parallel_size: 1

data:
  input_path: data/aime25.jsonl
  output_dir: outputs

logging:
  save_prompt: true
  save_latency: true
  save_errors: true
