# LoRA verification training config.
#
# Goal: prove the end-to-end pipeline (data -> train -> save adapter -> vLLM
# load -> eval at Kaggle params) runs cleanly on a single H200. NOT a tuning
# config. Numbers are sized for a small dataset (~200 samples) and one epoch
# so the verification slurm job finishes inside ~2h.
#
# Constraints driven by Kaggle eval (see configs/eval_kaggle.yaml):
#   - rank <= 32 (we use 16 to stay clear of the cap)
#   - sequence length aligned to the 8192 eval context (we train at 4096 to
#     leave activation/KV headroom on a single H200 during backward)
#   - target_modules MUST exclude MoE expert layers. vLLM 0.12.0's
#     NemotronHForCausalLM does not implement get_expert_mapping, so any
#     adapter containing LoRAs on MoE expert weights fails to load with
#     "AttributeError: To support LoRA for MoE model, 'get_expert_mapping'
#     must be implemented". Kaggle scores via vLLM, so this is a submission
#     constraint, not just a local-eval one. Earlier "all-linear" guidance
#     was inverted by this finding (job 6516064, 2026-05-02) — see
#     docs/lora_strategy.md §3 "vLLM MoE LoRA constraint".

model:
  name: nvidia/NVIDIA-Nemotron-3-Nano-30B-A3B-BF16
  dtype: bfloat16
  # Container's transformers (4.57.3) has no built-in NemotronHForCausalLM,
  # so we must take the remote-code path. The remote modeling code requires
  # mamba-ssm + causal-conv1d to be importable (no PyTorch fallback); the
  # slurm script verifies their presence in $SCRATCH/lora_pip.
  trust_remote_code: true

lora:
  r: 16
  alpha: 32
  dropout: 0.0
  # Attention-only target list. Substring-matched against module names, so
  # this picks up q/k/v/o across all attention blocks and ignores MoE
  # expert layers (mixer.experts.<idx>.down_proj/up_proj) and Mamba
  # projections. Verification milestone: minimum-viable LoRA that vLLM
  # will load. Broadening to Mamba/router layers is a follow-up once
  # verification is green and we've confirmed which non-expert modules
  # vLLM's NemotronHForCausalLM supports LoRA on.
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
  bias: none
  task_type: CAUSAL_LM

data:
  input_path: data/lora_traces.jsonl
  max_seq_len: 4096
  # Loss is computed on the assistant turn only — user prompt tokens get
  # label=-100. Set to false to train on full sequence (less faithful to
  # the inference-time distribution but slightly simpler).
  mask_user_loss: true

train:
  num_epochs: 1
  per_device_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 2.0e-4
  lr_scheduler: cosine
  warmup_ratio: 0.03
  weight_decay: 0.0
  gradient_checkpointing: true
  bf16: true
  logging_steps: 5
  save_steps: 0          # adapter is saved once at end; intermediate ckpts off for verification
  seed: 42

output:
  adapter_dir: outputs/lora_adapter
